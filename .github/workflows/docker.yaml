---
name: Docker Build Action
on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: false

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9

  tests:
    name: All tests succeeded
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Matrix jobs passed
        if: ${{ contains(needs.test.result, 'success') }}
        run: exit 0
      - name: Fail if matrix jobs did not succeed
        if: ${{ !contains(needs.test.result, 'success') }}
        run: exit 1

  test:
    name: Test ${{ matrix.package-group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each entry runs tests for a subset of packages.
          # Adjust the 'packages' globs to match your actual pkg/ layout.
          - package-group: ip-network
            packages: ./pkg/service/{api,admin}/ip/...  ./pkg/service/{api,admin}/network/...
          - package-group: project-tenant
            packages: ./pkg/service/{api,admin}/project/... ./pkg/service/{api,admin}/tenant/...
          - package-group: machine-switch
            packages: ./pkg/service/{api,admin}/machine/... ./pkg/service/admin/switch/...
          - package-group: partition-vpn
            packages: ./pkg/service/{api,admin}/partition/... ./pkg/service/admin/vpn/...
          - package-group: image-size
            packages: ./pkg/service/{api,admin}/image/... ./pkg/service/{api,admin}/size/...
          - package-group: infra
            packages: ./pkg/service/infra/...
          - package-group: e2e
            packages: ./pkg/e2e
          - package-group: other
            # Catch-all: everything not covered above, including cmd/ and top-level pkg/
            packages: >-
              $(go list ./... |
                grep -v 'metal-apiserver/pkg/e2e' |
                grep -v 'metal-apiserver/pkg/service/api/image' |
                grep -v 'metal-apiserver/pkg/service/api/ip' |
                grep -v 'metal-apiserver/pkg/service/api/machine' |
                grep -v 'metal-apiserver/pkg/service/api/network' |
                grep -v 'metal-apiserver/pkg/service/api/partition' |
                grep -v 'metal-apiserver/pkg/service/api/project' |
                grep -v 'metal-apiserver/pkg/service/api/size' |
                grep -v 'metal-apiserver/pkg/service/api/tenant' |
                grep -v 'metal-apiserver/pkg/service/admin/image' |
                grep -v 'metal-apiserver/pkg/service/admin/ip' |
                grep -v 'metal-apiserver/pkg/service/admin/machine' |
                grep -v 'metal-apiserver/pkg/service/admin/network' |
                grep -v 'metal-apiserver/pkg/service/admin/partition' |
                grep -v 'metal-apiserver/pkg/service/admin/project' |
                grep -v 'metal-apiserver/pkg/service/admin/size' |
                grep -v 'metal-apiserver/pkg/service/admin/tenant' |
                grep -v 'metal-apiserver/pkg/service/admin/switch' |
                grep -v 'metal-apiserver/pkg/service/admin/vpn' |
                grep -v 'metal-apiserver/pkg/service/infra' |
                tr '\n' ' ')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -covermode=atomic \
            -coverpkg=./... \
            -coverprofile=coverage-${{ matrix.package-group }}.out \
            ${{ matrix.packages }}

      - name: Upload partial coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package-group }}
          path: coverage-${{ matrix.package-group }}.out
          retention-days: 1

  coverage:
    name: Merge Coverage & Upload
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: false

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-parts/

      - name: Run Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-*.out
          verbose: true

  build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to the container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build
        run: |
          make server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.26
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        cache: false
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: run benchmark
      run: |
        make bench | tee output.txt

    - name: Download previous benchmark data
      uses: actions/cache@v5
      with:
        path: ./cache
        key: ${{ runner.os }}-benchmark

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'go'
        output-file-path: output.txt
         # GitHub API token to make a commit comment
        github-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-alert: true
